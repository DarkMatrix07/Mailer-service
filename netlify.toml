[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Clean URLs so the Laravel app can call {SITE}/send and {SITE}/health
# (status 200 = rewrite, preserves the POST body).
[[redirects]]
  from = "/send"
  to = "/.netlify/functions/send"
  status = 200

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/health"
  status = 200
